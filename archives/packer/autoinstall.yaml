#cloud-config
# =============================================================================
# Ubuntu Server Autoinstall Configuration - GOLDEN IMAGE FOR VMware
# =============================================================================
#
# HOW TO USE THIS FILE:
# =====================
# Option 1: Host locally
#   - Save as 'autoinstall.yaml'
#   - Serve with: python3 -m http.server 8000
#   - Boot Ubuntu ISO, press 'e', append:
#       autoinstall ds=nocloud-net;s=http://<your-ip>:8000/
#
# Option 2: Use this GitHub URL (direct)
# This file can be downloaded from this URL:
#    https://raw.githubusercontent.com/mioangr/local-ai-agent/refs/heads/main/autoinstall.yaml
#   - Boot Ubuntu ISO, press 'e', append:
#       autoinstall ds=nocloud-net;s=https://raw.githubusercontent.com/mioangr/local-ai-agent/refs/heads/main/
#   - Ensure VM has internet access.
#
# DISK SIZE NOTE:
#   The disk size is set in VMware Workstation when you create the VM.
#   This installer will use the ENTIRE virtual disk presented (e.g., 40GB).
#   To verify: In VMware, set disk size to 40GB before starting the install.
#
# VARIABLES SECTION (using YAML anchors for easy changes)
# =======================================================
# To change any value, edit only the 'vars:' block below.
# YAML anchors (&) and aliases (*) allow reuse.
#
# For advanced variable substitution (e.g., from environment variables):
#   Use a template with {{VAR}} and run: envsubst < autoinstall.template.yaml > autoinstall.yaml
#   Then serve the generated file.
#
# =============================================================================

# --- USER-DEFINED VARIABLES (EDIT HERE ONLY) ---
vars:
  # System identity
  hostname: &hostname "vm_ai_agent"
  username: &username "iadmin"
  # Password hash generated with: openssl passwd -6 "your_password"
  password_hash: &password_hash "$6$BQnOI0sC04/lVlAP$/zkT3wrUJUjOmpnsdvbnxv8ykih3Y76WnDy1Aw0rglGOU95gAtLbFibkIK1qt5yJZ4wwIr5C9k7NRDiWxN0wp."
  
  # Localisation
  locale: &locale "en_GB.UTF-8"
  keyboard_layout: &keyboard_layout "gr"   # Greek layout
  
  # Network
  use_dhcp: &use_dhcp true
  # If use_dhcp is false, uncomment and fill:
  # static_ip: &static_ip "192.168.1.100/24"
  # static_gateway: &static_gateway "192.168.1.1"
  # static_dns: &static_dns "8.8.8.8,8.8.4.4"
  
  # Disk partitioning: "direct" (simple) or "lvm"
  partitioning: &partitioning "direct"
  
  # Packages to install (space-separated, will be converted to list)
  extra_packages: &extra_packages 
    - "curl"
    - "wget"
    - "git"
    - "vim"
    - "htop"
    - "build-essential"
    - "python3"
    - "python3-pip"
    - "python3-venv"
    - "net-tools"
    - "ufw"
    - "fail2ban"
  
  # Security: restrict LAN access via iptables? (true/false)
  restrict_lan: &restrict_lan false   # Set to true to block private subnets (may break DHCP)
# --- END OF VARIABLES ---

autoinstall:
  version: 1
  locale: *locale
  keyboard:
    layout: *keyboard_layout
    variant: ""
    toggle: ""

  # Network configuration (DHCP by default)
  network:
    network:
      version: 2
      ethernets:
        install:
          match:
            name: "e*"
          dhcp4: *use_dhcp
          # If using static IP, uncomment below and comment dhcp4 line
          # addresses: [*static_ip]
          # gateway4: *static_gateway
          # nameservers:
          #   addresses: [*static_dns]
          dhcp-identifier: mac

  # Storage: uses entire disk
  storage:
    layout:
      name: *partitioning   # "direct" = single ext4 partition, "lvm" = LVM
    # Optionally enforce minimum disk size (in GB)
    # config:
    #   - id: disk0
    #     type: disk
    #     match:
    #       size: largest
    #     ptable: gpt
    #     preserve: false
    #     grub_device: true
    #   - id: root_partition
    #     type: partition
    #     device: disk0
    #     size: 40G   # <-- This would ensure at least 40GB is used
    #     # But usually not needed because the whole disk is used.

  identity:
    hostname: *hostname
    username: *username
    password: *password_hash

  ssh:
    install-server: true
    allow-pw: true

  packages: *extra_packages

  updates: "security"

  # Post-install commands
  late-commands:
    # Full system upgrade
    - curtin in-target -- apt-get update -y
    - curtin in-target -- apt-get upgrade -y

    # Install Ollama (for AI models)
    - curtin in-target -- curl -fsSL https://ollama.com/install.sh | sh
    - curtin in-target -- systemctl enable ollama
    - curtin in-target -- systemctl start ollama

    # Firewall: deny incoming, allow outgoing
    - curtin in-target -- ufw default deny incoming
    - curtin in-target -- ufw default allow outgoing
    # - curtin in-target -- ufw allow 22/tcp   # Uncomment if need SSH from outside
    - curtin in-target -- ufw --force enable

    # Optional: Restrict LAN access (if restrict_lan is true)
    # Warning: This may block DHCP renewal if your DHCP server is on a private subnet.
    # For VMware, using NAT network mode is a cleaner isolation method.
    # To enable, change 'restrict_lan: true' above.
    - |
      if [ "*restrict_lan" = "true" ]; then
        curtin in-target -- iptables -A OUTPUT -d 10.0.0.0/8 -j DROP
        curtin in-target -- iptables -A OUTPUT -d 172.16.0.0/12 -j DROP
        curtin in-target -- iptables -A OUTPUT -d 192.168.0.0/16 -j DROP
        curtin in-target -- iptables-save > /etc/iptables/rules.v4
      fi

    # Disable root SSH login
    - curtin in-target -- sed -i 's/^PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
    - curtin in-target -- systemctl restart ssh

    # Clean package cache
    - curtin in-target -- apt-get clean

  # Write a README file
  write_files:
    - path: /home/*username*/README_FIRST.txt
      content: |
        ================================================================
        Ubuntu Server "vm_ai_agent" - Golden Image
        ================================================================
        Hostname: *hostname
        Username: *username

        AI tools: Ollama installed (service on port 11434)
        To pull a model: ollama pull deepseek-coder

        Security: UFW enabled (deny incoming, allow outgoing)
        Root SSH login disabled

        For network isolation: Use VMware NAT mode.
      owner: *username:*username
      permissions: '0644'
